<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trang thành viên - Nhóm 12A3</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #f0f8ff); 
            margin: 0;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .box-thanh-vien {
            background-color: white;
            border-radius: 12px;
            border-top: 5px solid #00529c; 
            width: 70%;
            max-width: 800px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            animation: fadeInUp 0.8s ease-out;
        }
        .box-thanh-vien h2 {
            color: #00529c;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 28px;
            text-transform: uppercase;
        }
        .luoi-thanh-vien {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px; 
        }
        .nguoi {
            width: calc(50% - 20px); 
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            box-sizing: border-box; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
        }
        .nguoi:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }
        .nguoi h4 {
            color: #d32f2f; 
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .nguoi img {
            width: 100%;
            height: 250px; 
            object-fit: cover;
            border-radius: 8px;
            background-color: #e0e0e0; 
        }
        .nut-back {
            display: inline-block;
            margin-top: 30px;
            background-color: #00529c;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none; 
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .nut-back:hover {
            background-color: #d32f2f;
            transform: translateY(-2px);
        }
    </style>
</head>
